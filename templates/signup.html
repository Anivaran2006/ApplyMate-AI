<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account – ApplyMate AI</title>
  <meta name="description" content="Join ApplyMate AI – Get AI-powered educational notices for NEET, JEE, CUET and more. Free forever.">
  <link rel="stylesheet" href="/static/css/main.css">
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; }
    .auth-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 80px 24px 40px; position: relative; overflow: hidden; }
    .auth-bg { position: fixed; inset: 0; background: var(--grad-hero); z-index: 0; }
    .auth-orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; }
    .auth-orb-1 { width: 400px; height: 400px; background: rgba(124,58,237,0.2); top: -100px; right: -100px; }
    .auth-orb-2 { width: 300px; height: 300px; background: rgba(6,182,212,0.15); bottom: -80px; left: -80px; }
    .auth-card { position: relative; z-index: 1; background: rgba(15,15,30,0.85); backdrop-filter: blur(24px); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 48px; width: 100%; max-width: 480px; box-shadow: var(--shadow-lg), var(--shadow-glow-sm); animation: fadeInUp 0.5s ease both; }
    .auth-logo { display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 22px; font-weight: 800; color: var(--text-primary); margin-bottom: 32px; text-decoration: none; }
    .auth-logo .logo-icon { width: 40px; height: 40px; background: var(--grad-primary); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .auth-title { font-size: 26px; font-weight: 800; text-align: center; margin-bottom: 8px; }
    .auth-subtitle { font-size: 14px; color: var(--text-secondary); text-align: center; margin-bottom: 32px; }
    .form-group { margin-bottom: 20px; }
    .form-footer { text-align: center; margin-top: 24px; font-size: 14px; color: var(--text-secondary); }
    .form-footer a { color: var(--primary-light); font-weight: 600; }
    .input-icon-wrap { position: relative; }
    .input-icon-wrap .input { padding-left: 44px; }
    .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 16px; pointer-events: none; color: var(--text-muted); }
    .password-toggle { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; padding: 0; transition: color var(--transition); }
    .password-toggle:hover { color: var(--primary-light); }
    .btn-full { width: 100%; }
    .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: var(--radius-sm); padding: 12px 16px; font-size: 13px; color: #fca5a5; margin-bottom: 20px; display: none; }
    .password-strength { margin-top: 8px; }
    .strength-bar { height: 4px; border-radius: 2px; background: var(--border-light); margin-bottom: 4px; overflow: hidden; }
    .strength-fill { height: 100%; border-radius: 2px; transition: width 0.3s, background 0.3s; width: 0; }
    .strength-label { font-size: 11px; color: var(--text-muted); }
    .benefits { display: flex; flex-direction: column; gap: 8px; margin-bottom: 28px; }
    .benefit { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text-secondary); }
    .benefit-check { width: 20px; height: 20px; background: rgba(16,185,129,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="auth-bg"></div>
  <div class="auth-orb auth-orb-1"></div>
  <div class="auth-orb auth-orb-2"></div>

  <div class="auth-wrapper">
    <div class="auth-card">
      <a href="/" class="auth-logo">
        <div class="logo-icon">🎓</div>
        ApplyMate <span style="color:var(--primary-light)">AI</span>
      </a>

      <h1 class="auth-title">Create your account</h1>
      <p class="auth-subtitle">Free forever. AI-powered. Instant alerts.</p>

      <div class="benefits">
        <div class="benefit"><div class="benefit-check">✓</div> AI summaries of every official notice</div>
        <div class="benefit"><div class="benefit-check">✓</div> Telegram & Email instant alerts</div>
        <div class="benefit"><div class="benefit-check">✓</div> 9 exam categories supported</div>
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <form id="signupForm" novalidate>
        <div class="form-group">
          <label class="input-label" for="fullName">Full Name</label>
          <div class="input-icon-wrap">
            <span class="input-icon">👤</span>
            <input type="text" id="fullName" class="input" placeholder="Your full name" required autocomplete="name">
          </div>
        </div>

        <div class="form-group">
          <label class="input-label" for="email">Email Address</label>
          <div class="input-icon-wrap">
            <span class="input-icon">✉️</span>
            <input type="email" id="email" class="input" placeholder="you@example.com" required autocomplete="email">
          </div>
        </div>

        <div class="form-group">
          <label class="input-label" for="password">Password</label>
          <div class="input-icon-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" class="input" placeholder="Min. 8 characters" required autocomplete="new-password" style="padding-right:44px" oninput="checkStrength(this.value)">
            <button type="button" class="password-toggle" onclick="togglePassword('password',this)">👁️</button>
          </div>
          <div class="form-group">
    <label class="input-label">Select Exams</label>

<div class="exam-list">

<label><input type="checkbox" value="JEE"> JEE</label><br>
<label><input type="checkbox" value="NEET"> NEET</label><br>
<label><input type="checkbox" value="CUET"> CUET</label><br>
<label><input type="checkbox" value="GATE"> GATE</label><br>
<label><input type="checkbox" value="CAT"> CAT</label><br>
<label><input type="checkbox" value="UPSC"> UPSC</label><br>
<label><input type="checkbox" value="SSC"> SSC</label><br>
<label><input type="checkbox" value="BANKING"> BANKING</label><br>
<label><input type="checkbox" value="RAILWAY"> RAILWAY</label><br>
<label><input type="checkbox" value="CLAT"> CLAT</label>

</div>
</div>
          <div class="password-strength">
            <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
            <span class="strength-label" id="strengthLabel"></span>
          </div>
        </div>

        <div class="form-group">
          <label class="input-label" for="confirmPassword">Confirm Password</label>
          <div class="input-icon-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="confirmPassword" class="input" placeholder="Repeat your password" required autocomplete="new-password" style="padding-right:44px">
            <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword',this)">👁️</button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="submitBtn">
          <span id="submitText">🚀 Create Account</span>
          <div class="spinner" id="spinner"></div>
        </button>
      </form>

      <div class="form-footer" style="margin-top:20px;">
        Already have an account? <a href="/login">Sign in</a>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="/static/js/config.js"></script>
  <script src="/static/js/api.js"></script>
  <script>
    requireGuest();

    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId) || btn.previousElementSibling;
      if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
      else { input.type = 'password'; btn.textContent = '👁️'; }
    }

    function checkStrength(val) {
      const fill = document.getElementById('strengthFill');
      const label = document.getElementById('strengthLabel');
      let score = 0;
      if (val.length >= 8) score++;
      if (val.length >= 12) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      const levels = [
        { width: '20%', color: '#ef4444', text: 'Very weak' },
        { width: '40%', color: '#f97316', text: 'Weak' },
        { width: '60%', color: '#f59e0b', text: 'Fair' },
        { width: '80%', color: '#10b981', text: 'Strong' },
        { width: '100%', color: '#06b6d4', text: 'Very strong' },
      ];
      const lvl = levels[Math.min(score - 1, 4)] || { width: '0', color: '', text: '' };
      fill.style.width = val ? lvl.width : '0';
      fill.style.background = lvl.color;
      label.textContent = val ? lvl.text : '';
      label.style.color = lvl.color;
    }

    function setLoading(loading) {
      const btn = document.getElementById('submitBtn');
      btn.disabled = loading;
      document.getElementById('submitText').style.display = loading ? 'none' : 'block';
      document.getElementById('spinner').style.display = loading ? 'block' : 'none';
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      document.getElementById('errorMsg').style.display = 'none';

      const fullName = document.getElementById('fullName').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;
      const categories = Array.from(
    document.querySelectorAll(".exam-list input:checked")
).map(cb => cb.value);
      if (!fullName || !email || !password) { showError('Please fill in all fields.'); return; }
      if (password.length < 8) { showError('Password must be at least 8 characters.'); return; }
      if (password !== confirm) { showError('Passwords do not match.'); return; }
        if (categories.length === 0) {
    showError("Please select at least one exam.");
    return;
}
      setLoading(true);
      try {
        const data = await API.auth.register({
    email,
    password,
    categories
});
      
        showToast('Account created! Setting up your dashboard...', 'success');
        setTimeout(() => { window.location.href = '/login'; }, 1000);
      } catch (err) {
        console.log(err);

    if (err.message) {
        showError(err.message);
    } else {
        showError(JSON.stringify(err));
    }
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
