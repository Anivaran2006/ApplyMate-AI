<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password – ApplyMate AI</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--grad-hero); padding: 24px; }
    .auth-orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; }
    .auth-orb-1 { width: 400px; height: 400px; background: rgba(124,58,237,0.2); top: -100px; right: -100px; }
    .auth-orb-2 { width: 300px; height: 300px; background: rgba(6,182,212,0.15); bottom: -80px; left: -80px; }
    .auth-card { position: relative; z-index: 1; background: rgba(15,15,30,0.85); backdrop-filter: blur(24px); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 48px; width: 100%; max-width: 440px; box-shadow: var(--shadow-lg), var(--shadow-glow-sm); animation: fadeInUp 0.5s ease both; }
    .auth-logo { display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 22px; font-weight: 800; color: var(--text-primary); margin-bottom: 32px; text-decoration: none; }
    .auth-logo .logo-icon { width: 40px; height: 40px; background: var(--grad-primary); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .form-group { margin-bottom: 20px; }
    .input-icon-wrap { position: relative; }
    .input-icon-wrap .input { padding-left: 44px; }
    .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 16px; pointer-events: none; color: var(--text-muted); }
    .btn-full { width: 100%; }
    .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .success-state { text-align: center; display: none; }
    .success-icon { font-size: 64px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="auth-orb auth-orb-1"></div>
  <div class="auth-orb auth-orb-2"></div>

  <div class="auth-card">
    <a href="/" class="auth-logo"></a>
      <div class="logo-icon">🎓</div>
      ApplyMate <span style="color:var(--primary-light)">AI</span>
    </a>

    <!-- Request form -->
    <div id="requestForm">
      <h1 style="font-size:24px;font-weight:800;text-align:center;margin-bottom:8px;">Forgot Password?</h1>
      <p style="font-size:14px;color:var(--text-secondary);text-align:center;margin-bottom:32px;">Enter your email and we'll send you a reset link.</p>

      <form id="forgotForm" novalidate>
        <div class="form-group">
          <label class="input-label" for="email">Email Address</label>
          <div class="input-icon-wrap">
            <span class="input-icon">✉️</span>
            <input type="email" id="email" class="input" placeholder="you@example.com" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="submitBtn">
          <span id="submitText">Send Reset Link</span>
          <div class="spinner" id="spinner"></div>
        </button>
      </form>

      <div style="text-align:center;margin-top:20px;font-size:14px;color:var(--text-secondary);">
        <a href="/login" style="color:var(--primary-light);font-weight:600;">← Back to login</a>
      </div>
    </div>

    <!-- Success state -->
    <div class="success-state" id="successState">
      <div class="success-icon">📬</div>
      <h2 style="font-size:22px;font-weight:800;margin-bottom:12px;">Check your inbox!</h2>
      <p style="font-size:14px;color:var(--text-secondary);line-height:1.7;margin-bottom:28px;">
        If that email is registered with us, you'll receive a password reset link shortly.
      </p>
      <a href="/login" class="btn btn-primary btn-full">Back to Login</a>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="/static/js/config.js"></script>
  <script src="/static/js/api.js"></script>
  <script>
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      if (!email) return;

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      document.getElementById('submitText').style.display = 'none';
      document.getElementById('spinner').style.display = 'block';

      try {
        await API.auth.forgotPassword(email);
        document.getElementById('requestForm').style.display = 'none';
        document.getElementById('successState').style.display = 'block';
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        btn.disabled = false;
        document.getElementById('submitText').style.display = 'block';
        document.getElementById('spinner').style.display = 'none';
      }
    });
  </script>
</body>
</html>
