<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – ApplyMate AI</title>
  <meta name="description" content="Sign in to your ApplyMate AI account to manage your exam notifications.">
  <link rel="stylesheet" href="/static/css/main.css">
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; }

    .auth-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 24px 40px;
      position: relative;
      overflow: hidden;
    }

    .auth-bg {
      position: fixed;
      inset: 0;
      background: var(--grad-hero);
      z-index: 0;
    }

    .auth-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
    }
    .auth-orb-1 { width: 400px; height: 400px; background: rgba(124,58,237,0.2); top: -100px; right: -100px; }
    .auth-orb-2 { width: 300px; height: 300px; background: rgba(6,182,212,0.15); bottom: -80px; left: -80px; }

    .auth-card {
      position: relative;
      z-index: 1;
      background: rgba(15, 15, 30, 0.85);
      backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 48px;
      width: 100%;
      max-width: 460px;
      box-shadow: var(--shadow-lg), var(--shadow-glow-sm);
      animation: fadeInUp 0.5s ease both;
    }

    .auth-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 22px;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 32px;
      text-decoration: none;
    }

    .auth-logo .logo-icon {
      width: 40px; height: 40px;
      background: var(--grad-primary);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    .auth-title { font-size: 26px; font-weight: 800; text-align: center; margin-bottom: 8px; }
    .auth-subtitle { font-size: 14px; color: var(--text-secondary); text-align: center; margin-bottom: 32px; }

    .form-group { margin-bottom: 20px; }

    .form-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .form-footer a { color: var(--primary-light); font-weight: 600; }
    .form-footer a:hover { color: var(--accent-light); }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: var(--text-muted);
      font-size: 13px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-light);
    }

    .input-icon-wrap { position: relative; }
    .input-icon-wrap .input { padding-left: 44px; }
    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      pointer-events: none;
      color: var(--text-muted);
    }

    .password-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
      padding: 0;
      transition: color var(--transition);
    }
    .password-toggle:hover { color: var(--primary-light); }

    .forgot-link {
      display: block;
      text-align: right;
      font-size: 13px;
      color: var(--primary-light);
      margin-top: 8px;
    }

    .btn-full { width: 100%; }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      font-size: 13px;
      color: #fca5a5;
      margin-bottom: 20px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="auth-bg"></div>
  <div class="auth-orb auth-orb-1"></div>
  <div class="auth-orb auth-orb-2"></div>

  <div class="auth-wrapper">
    <div class="auth-card">
      <a href="/" class="auth-logo">
        <div class="logo-icon">🎓</div>
        ApplyMate <span style="color:var(--primary-light)">AI</span>
      </a>

      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to receive your AI-powered notices</p>

      <div class="error-msg" id="errorMsg"></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label class="input-label" for="email">Email Address</label>
          <div class="input-icon-wrap">
            <span class="input-icon">✉️</span>
            <input type="email" id="email" class="input" placeholder="you@example.com" required autocomplete="email">
          </div>
        </div>

        <div class="form-group">
          <label class="input-label" for="password">Password</label>
          <div class="input-icon-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" class="input" placeholder="Your password" required autocomplete="current-password" style="padding-right:44px">
            <button type="button" class="password-toggle" id="pwToggle" onclick="togglePassword('password','pwToggle')">👁️</button>
          </div>
          <a href="/forgot-password" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="submitBtn">
          <span id="submitText">Sign In</span>
          <div class="spinner" id="spinner"></div>
        </button>
      </form>

      <div class="divider">or</div>

      <div class="form-footer">
        Don't have an account? <a href="/signup">Create one free</a>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="/static/js/api.js"></script>
  
  <script>
    // Redirect if already logged in
    requireGuest();

    function togglePassword(inputId, btnId) {
      const input = document.getElementById(inputId);
      const btn = document.getElementById(btnId);
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
      } else {
        input.type = 'password';
        btn.textContent = '👁️';
      }
    }

    function setLoading(loading) {
      const btn = document.getElementById('submitBtn');
      const text = document.getElementById('submitText');
      const spinner = document.getElementById('spinner');
      btn.disabled = loading;
      text.style.display = loading ? 'none' : 'block';
      spinner.style.display = loading ? 'block' : 'none';
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function hideError() {
      document.getElementById('errorMsg').style.display = 'none';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showError('Please fill in all fields.');
        return;
      }

      setLoading(true);
      try {
       await API.auth.login({

    email,

    password

});

showToast("Login Successful");

setTimeout(() => {

    window.location.href = "/dashboard";

}, 500);

      } catch (err) {
        showError(
    err.message || "Login Failed"
);
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
